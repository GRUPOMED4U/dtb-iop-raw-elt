name: Run GED Load Test Job (manual)

# Só dispara manualmente (botão "Run workflow" no GitHub) -- nunca em push.
# Isso copia de verdade arquivos do GED via SMB (fonte real, produção), mas escreve
# em destinos de teste (iop.raw.tb_result_carga_files_ged_test, /Volumes/iop/raw/files/GED_test/)
# -- não toca nos destinos reais usados pelo job legado `load_files_ged`.
on:
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

jobs:
  run-job:
    runs-on: ubuntu-latest
    environment: dev
    env:
      DATABRICKS_AUTH_TYPE: github-oidc
      DATABRICKS_HOST: https://8259557250383794.4.gcp.databricks.com
      DATABRICKS_CLIENT_ID: 83de5c11-53ff-4142-bee7-7fc04713f273
    steps:
      - uses: actions/checkout@v4

      - uses: databricks/setup-cli@main

      - name: Deploy bundle (dev)
        run: databricks bundle deploy --target dev

      - name: Roda o job de teste (load_files_ged_test)
        run: databricks bundle run load_files_ged_test --target dev
